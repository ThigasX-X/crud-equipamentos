version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tscontrol-db
    environment:
      POSTGRES_DB: tscontrol
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/backend
    container_name: tscontrol-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${SPRING_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - db

  frontend:
    build: ./apps/frontend
    container_name: tscontrol-frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
