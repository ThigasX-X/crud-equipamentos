services:
  db:
    image: postgres:15-alpine
    container_name: it-assets-db
    environment:
      POSTGRES_DB: UNICEPLAC_EQUIPAMENTOS
      POSTGRES_USER: ${DB_USERNAME:-crudEquipamentos}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-crudEquipamentos} -d UNICEPLAC_EQUIPAMENTOS"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/backend
    container_name: it-assets-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=UNICEPLAC_EQUIPAMENTOS
      - DB_USERNAME=${DB_USERNAME:-crudEquipamentos}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=2h
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./apps/frontend
    container_name: it-assets-frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
